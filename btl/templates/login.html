<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><title>Đăng nhập</title>
  <style>
    body{font-family:Segoe UI,Arial;background:#f5f7fa;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
    .card{background:#fff;padding:32px 36px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.1);width:380px}
    h2{margin:0 0 16px}
    label{display:block;margin:10px 0 6px;font-weight:600}
    input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px}
    .btn{width:100%;margin-top:16px;padding:12px;background:#2f6fed;color:#fff;border:none;border-radius:8px;cursor:pointer}
    .err{color:#b42318;margin-top:10px}
    .link{margin-top:12px;text-align:center}
    a{color:#2f6fed;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h2>Đăng nhập</h2>
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <label for="id_email">Email</label>
      <input id="id_email" type="email" name="email" required autofocus autocomplete="email" value="{{ request.POST.email|default:'' }}">
      <label for="id_password">Mật khẩu</label>
      <input id="id_password" type="password" name="password" required autocomplete="current-password">
      <button class="btn" type="submit">Đăng nhập</button>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
    </form>
    <div class="link">
      <a href="{% url 'register' %}">Chưa có tài khoản? Đăng ký</a>
    </div>
  </div>
</body>
</html>
