<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành công</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h2 { color: #27ae60; }
        p { margin: 10px 0; color: #333; }
        b { color: #2c3e50; }
        a {
            display: inline-block;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        a:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Đăng ký thành công!</h2>
        <p>Chào mừng, <b>{{ user.full_name }}</b></p>
        
        <p>Vai trò của bạn: <b>{{ user.role_id.role_name }}</b></p>
        
        <a href="{% url 'profile' %}">Về trang chủ</a>
    </div>
</body>
</html>
