<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký tài khoản</title>
  <style>
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f7fa;margin:0;display:flex;justify-content:center;align-items:center;height:100vh}
    .container{background:#fff;padding:40px 45px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,.1);width:420px;text-align:center}
    h2{color:#333;margin-bottom:20px}
    form{text-align:left}
    label{display:block;margin-top:12px;font-weight:600;color:#444}
    input,select{width:100%;padding:10px 12px;margin-top:5px;border:1px solid #ccc;border-radius:8px;font-size:14px;box-sizing:border-box;transition:border-color .2s,box-shadow .2s}
    input:focus{border-color:#4a90e2;box-shadow:0 0 0 3px rgba(74,144,226,.2);outline:none}
    button{width:100%;padding:12px;margin-top:22px;background:#007bff;border:none;color:#fff;font-size:15px;border-radius:8px;cursor:pointer;transition:background-color .3s}
    button:hover{background:#0056b3}
    .note{margin-top:20px;font-size:13px;color:#666;text-align:center}
    .footer{margin-top:16px;font-size:12px;color:#888;text-align:center}
    .errors{color:#b42318;margin:8px 0 0}
  </style>
</head>
<body>
  <div class="container">
    <h2>Đăng ký tài khoản</h2>

    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="errors">{{ form.non_field_errors }}</div>
      {% endif %}
      {{ form.as_p }}
      <button type="submit">Đăng ký</button>
    </form>
    <div class="footer">
      Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập</a>
    </div>
  </div>
</body>
</html>
