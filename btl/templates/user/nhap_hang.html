<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Yêu cầu nhập hàng</title>
<style>
    body {font-family: 'Segoe UI', Arial; background: #f5f7fa; margin: 0; padding: 30px;}
    .container {max-width: 600px; margin: auto; background: #fff; padding: 28px 36px; border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,.08);}
    
    /* Style cho Topbar và Nút Back */
    .topbar {display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
    .back-btn {background: #e9edf7; color: #1e3a8a; padding: 10px 14px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px;}
    .back-btn:hover {background: #dbe3f2;}
    
    h2 {text-align: center; color: #1e40af; margin-bottom: 20px; flex-grow: 1;}
    
    /* Form style */
    form {display: flex; flex-direction: column; gap: 15px;}
    label {font-weight: 600; color: #333;}
    input, select, textarea {padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%;}
    button {background: #2563eb; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600;}
    button:hover {background: #1d4ed8;}
    
    /* Message style */
    .msg {padding: 10px; background: #dcfce7; color: #166534; border-radius: 8px; margin-bottom: 15px; text-align: center;}
</style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <a href="{% url 'user_home' %}" class="back-btn">Trang điều khiển</a>
        <h2>Yêu cầu nhập hàng</h2>
        <div style="width: 100px;"></div> </div>

    {% if messages %}
        {% for message in messages %}
            <div class="msg">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label>Chọn đồ vật:</label>
        <select name="item_id" required>
            {% for item in items %}
            <option value="{{ item.item_id }}">{{ item.item_name }}</option>
            {% endfor %}
        </select>
        
        <label>Số lượng:</label>
        <input type="number" name="quantity" min="1" required>
        
        <label>Ghi chú:</label>
        <textarea name="note" rows="3"></textarea>
        
        <button type="submit">Gửi yêu cầu</button>
    </form>
</div>
</body>
</html>
